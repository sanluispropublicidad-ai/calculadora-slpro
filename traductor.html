<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLPRO | TRADUCTOR ELITE 33X</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --panel-bg: rgba(20, 20, 22, 0.85);
            --accent-red: #d32f2f;
            --accent-glow: rgba(211, 47, 47, 0.4);
            --text-main: #e0e0e0;
            --text-dim: #888;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 2% 2%, rgba(211, 47, 47, 0.05) 0%, transparent 25%),
                radial-gradient(circle at 98% 98%, rgba(211, 47, 47, 0.05) 0%, transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-weight: 800;
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .header h1 span {
            color: var(--accent-red);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .translator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-panel, .output-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            color: #fff;
            font-size: 1.1rem;
            resize: none;
            min-height: 250px;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-red);
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.1);
        }

        .output-box {
            background: rgba(211, 47, 47, 0.03);
            border: 1px dashed rgba(211, 47, 47, 0.2);
            border-radius: 12px;
            padding: 20px;
            color: #fff;
            font-size: 1.15rem;
            min-height: 250px;
            line-height: 1.6;
            white-space: pre-wrap;
            position: relative;
        }

        .btn-action {
            grid-column: span 2;
            background: var(--accent-red);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--accent-glow);
            filter: brightness(1.2);
        }

        .btn-action:active {
            transform: scale(0.98);
        }

        .status-bar {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.7rem;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        .loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(211, 47, 47, 0.1);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        .language-selector {
            grid-column: span 2;
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lang-btn.active {
            background: rgba(211, 47, 47, 0.15);
            border-color: var(--accent-red);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .lang-btn:hover:not(.active) {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>SLPRO <span>TRANSLATOR</span></h1>
            <p>Nemotron Super 33X Engine</p>
        </div>

        <div class="translator-grid">
            
            <div class="language-selector">
                <button class="lang-btn active" onclick="setLang('American English', this)">INGLÉS</button>
                <button class="lang-btn" onclick="setLang('Chinese (Simplified)', this)">CHINO</button>
                <button class="lang-btn" onclick="setLang('Esperanto', this)">ESPERANTO</button>
                <button class="lang-btn" onclick="setLang('Spanish (Mexico)', this)">ESPAÑOL</button>
                <button class="lang-btn" onclick="setLang('Russian', this)">RUSO</button>
            </div>

            <div class="input-panel">
                <div class="panel-label">ORIGEN (AUTO-DETECTAR)</div>
                <textarea id="inputText" placeholder="Escribe o pega aquí el texto en cualquier idioma..."></textarea>
            </div>

            <div class="output-panel">
                <div class="panel-label">
                    <span id="targetLabel">DESTINO (ENGLISH)</span>
                    <button class="copy-btn" onclick="copyResult()">COPY RESULT</button>
                </div>
                <div class="output-box" id="outputBox">
                    <div class="loading" id="loader">
                        <div class="spinner"></div>
                    </div>
                    <div id="resultText">La traducción aparecerá aquí...</div>
                </div>
            </div>

            <button class="btn-action" onclick="invokeNvidiaNim()">Ejecutar Traducción Elitista</button>

            <div class="status-bar">
                <div>SYS_STATUS: ONLINE</div>
                <div>MODEL: llama-3.3-nemotron-super-49B</div>
                <div>POWERED BY NVIDIA NIM</div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        const MODEL_ID = "nvidia/llama-3.3-nemotron-super-49b-v1";
        let targetLanguage = "American English";

        function setLang(lang, btn) {
            targetLanguage = lang;
            
            // Actualizar UI de botones
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Actualizar etiqueta
            document.getElementById('targetLabel').innerText = `DESTINO (${btn.innerText})`;

            // DISPARAR TRADUCCIÓN AUTOMÁTICA SI HAY TEXTO
            if (document.getElementById('inputText').value.trim()) {
                invokeNvidiaNim();
            }
        }

        async function invokeNvidiaNim() {
            const text = document.getElementById('inputText').value.trim();
            const resultElement = document.getElementById('resultText');
            const loader = document.getElementById('loader');

            if (!text) return;

            // Iniciar UI - Limpiar resultado previo para feedback visual
            resultElement.innerText = "...";
            resultElement.style.opacity = '0.3';
            loader.style.display = 'block';

            try {
                const response = await fetch('http://127.0.0.1:8000/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        language: targetLanguage
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    resultElement.innerText = data.choices[0].message.content.trim();
                } else {
                    resultElement.innerText = "Error: No se recibió respuesta del motor.";
                }

            } catch (error) {
                console.error(error);
                resultElement.innerText = "Error de conexión con el Proxy. Asegúrate de que el .bat esté corriendo.";
            } finally {
                resultElement.style.opacity = '1';
                loader.style.display = 'none';
            }
        }

        function copyResult() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text);
            alert("Traducción copiada al portapapeles.");
        }
    </script>
</body>
</html>
